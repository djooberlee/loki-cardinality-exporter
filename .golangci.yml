run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - errcheck
    - gofmt
    - goimports
    - gosimple
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused

linters-settings:
  gofmt:
    simplify: true
  errcheck:
    # Writing to an http.ResponseWriter or to Stderr/Stdout — the error cases
    # are not actionable for an exporter. Same for json.Encoder in test helpers.
    exclude-functions:
      - fmt.Fprint
      - fmt.Fprintf
      - fmt.Fprintln
      - (net/http.ResponseWriter).Write
      - (*encoding/json.Encoder).Encode
      - (io.Closer).Close
      - io.Copy

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
